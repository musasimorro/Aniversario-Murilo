<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Envie suas Fotos - Aniversário Mundo Bita</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #0a1929 0%, #0d3b66 30%, #1a8bb3 60%, #4ecdc4 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        .bubbles-container {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }
        
        .bubble {
            position: absolute;
            border-radius: 50%;
            animation: float-up linear infinite;
            opacity: 0;
            pointer-events: none;
        }
        
        .bubble-small {
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.3));
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .bubble-medium {
            background: radial-gradient(circle at 25% 25%, rgba(255,255,255,0.8), rgba(78,205,196,0.4));
            box-shadow: 0 0 15px rgba(78,205,196,0.5);
        }
        .bubble-large {
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.7), rgba(26,139,179,0.5));
            box-shadow: 0 0 20px rgba(26,139,179,0.6);
        }
        .bubble-shiny {
            background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.95), rgba(255,215,0,0.6));
            box-shadow: 0 0 25px rgba(255,215,0,0.8);
        }
        
        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            5% { opacity: 0.7; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
        @keyframes float-zigzag {
            0% { transform: translate(0, 100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            25% { transform: translate(20px, 75vh) scale(0.8); }
            50% { transform: translate(-15px, 50vh) scale(1); }
            75% { transform: translate(10px, 25vh) scale(1.1); }
            90% { opacity: 0.3; }
            100% { transform: translate(-5px, -10vh) scale(1.2); opacity: 0; }
        }
        @keyframes float-sideways {
            0% { transform: translate(0, 100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            25% { transform: translate(40px, 70vh) scale(0.7); }
            50% { transform: translate(-20px, 45vh) scale(0.9); }
            75% { transform: translate(15px, 20vh) scale(1); }
            100% { transform: translate(-25px, -10vh) scale(1.1); opacity: 0; }
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .fish-emoji {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            font-size: 2.5rem;
            opacity: 0.5;
            animation: swim-right-to-left linear infinite;
        }
        
        @keyframes swim-right-to-left {
            0% { transform: translateX(110vw) scaleX(1); }
            100% { transform: translateX(-100px) scaleX(1); }
        }
        @keyframes swim-wave {
            0% { transform: translateX(110vw) translateY(0) scaleX(1); }
            25% { transform: translateX(75vw) translateY(-15px) scaleX(1); }
            50% { transform: translateX(50vw) translateY(0) scaleX(1); }
            75% { transform: translateX(25vw) translateY(-10px) scaleX(1); }
            100% { transform: translateX(-100px) translateY(0) scaleX(1); }
        }
        
        .iframe-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .iframe-container iframe {
            width: 100%;
            height: 500px;
            border: none;
            display: block;
        }
        @media (max-width: 640px) {
            .iframe-container iframe { height: 420px; }
        }
    </style>
</head>
<body>
    <div class="bubbles-container" id="bubbles"></div>
    <div id="fishContainer"></div>

    <main class="relative z-10 max-w-lg mx-auto px-4 py-8">
        <div class="text-center mb-8 pt-6">
            <div class="inline-block bg-yellow-400 text-blue-900 px-6 py-2 rounded-full font-black text-lg mb-4 shadow-lg transform -rotate-2">
                📸 FOTOS DA FESTA
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-white mb-2" style="text-shadow: 3px 3px 0 #0a1929;">
                Compartilhe seus Cliques!
            </h1>
            <p class="text-xl font-bold text-yellow-300 mb-4" style="text-shadow: 2px 2px 0 #0a1929;">
                com o Mundo Bita 🐠
            </p>
        </div>

        <section class="glass-card rounded-3xl p-6 mb-8 text-white text-center">
            <p class="text-sm mb-6 opacity-90">
                Arraste suas fotos para a caixa abaixo ou clique para selecionar. Elas ficarão guardadas no nosso álbum de recordações!
            </p>
            <div class="iframe-container">
                <iframe src="https://driveuploader.com/upload/OWPc9kcAA9/" 
                        title="Upload de Fotos"
                        allow="camera;microphone">
                </iframe>
            </div>
            <p class="text-xs mt-4 opacity-70">🎈 Obrigado por fazer parte dessa história!</p>
        </section>

        <div class="text-center text-white/60 text-sm mb-8">
            <a href="convite.html" class="text-yellow-300 hover:underline">← Voltar para o convite</a>
        </div>
    </main>

    <script>
        // Bolhas e peixes (mesmo código)
        class BubbleGenerator {
            constructor() {
                this.container = document.getElementById('bubbles');
                this.bubbleTypes = ['bubble-small', 'bubble-medium', 'bubble-large', 'bubble-shiny'];
                this.animations = ['float-up', 'float-zigzag', 'float-sideways'];
                this.init();
            }
            init() {
                for (let i = 0; i < 15; i++) setTimeout(() => this.createBubble(), i * 200);
                setInterval(() => this.createBubble(), 800);
                setInterval(() => this.createBubbleGroup(), 4000);
            }
            createBubble() {
                const bubble = document.createElement('div');
                const type = this.bubbleTypes[Math.floor(Math.random() * this.bubbleTypes.length)];
                const animation = this.animations[Math.floor(Math.random() * this.animations.length)];
                bubble.classList.add('bubble', type);
                const size = Math.random() * 45 + 5;
                bubble.style.width = `${size}px`; bubble.style.height = `${size}px`;
                bubble.style.left = `${Math.random() * 95}%`;
                const duration = Math.random() * 10 + 8;
                bubble.style.animationDuration = `${duration}s`;
                bubble.style.animationName = animation;
                bubble.style.animationDelay = `${Math.random() * 2}s`;
                this.container.appendChild(bubble);
                setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, (duration + 2) * 1000);
            }
            createBubbleGroup() {
                const groupSize = Math.floor(Math.random() * 4) + 5;
                const baseX = Math.random() * 80;
                for (let i = 0; i < groupSize; i++) {
                    setTimeout(() => {
                        const bubble = document.createElement('div');
                        const type = this.bubbleTypes[Math.floor(Math.random() * this.bubbleTypes.length)];
                        bubble.classList.add('bubble', type);
                        const size = Math.random() * 25 + 8;
                        bubble.style.width = `${size}px`; bubble.style.height = `${size}px`;
                        bubble.style.left = `${baseX + (Math.random() * 20)}%`;
                        const duration = Math.random() * 6 + 7;
                        bubble.style.animationDuration = `${duration}s`;
                        bubble.style.animationName = 'float-up';
                        this.container.appendChild(bubble);
                        setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, (duration + 2) * 1000);
                    }, i * 300);
                }
            }
        }

        class FishDecorator {
            constructor() {
                this.container = document.getElementById('fishContainer');
                this.fishEmojis = ['🐠', '🐟', '🐡', '🐬', '🐋', '🐙', '🦀', '🦑', '🐚', '🦈'];
                this.init();
            }
            init() {
                for (let i = 0; i < 8; i++) setTimeout(() => this.createFish(), i * 1500);
                setInterval(() => { if (this.container.children.length < 10) this.createFish(); }, 8000);
            }
            createFish() {
                const fish = document.createElement('div');
                fish.classList.add('fish-emoji');
                fish.textContent = this.fishEmojis[Math.floor(Math.random() * this.fishEmojis.length)];
                fish.style.top = `${Math.random() * 75 + 10}%`;
                fish.style.fontSize = `${Math.random() * 2 + 2}rem`;
                fish.style.animationName = ['swim-right-to-left', 'swim-wave'][Math.floor(Math.random() * 2)];
                fish.style.animationDuration = `${Math.random() * 20 + 15}s`;
                fish.style.animationDelay = `${Math.random() * 5}s`;
                fish.style.opacity = Math.random() * 0.3 + 0.3;
                this.container.appendChild(fish);
                setTimeout(() => { if (fish.parentNode) fish.remove(); }, (parseFloat(fish.style.animationDuration) + 5) * 1000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new BubbleGenerator();
            new FishDecorator();
        });

        document.addEventListener('gesturestart', e => e.preventDefault());
    </script>
</body>
</html>
